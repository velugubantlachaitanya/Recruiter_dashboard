services:
  - type: web
    name: talentscout-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        value: localhost
      - key: SMTP_PORT
        value: "1025"
    healthCheckPath: /health
    plan: free
